# OpenEnv manifest for VSR-Env
# Requirements: 1.6, 20.1

name: vsr-env
version: 1.0.0
description: Volatility Surface Reasoning Environment for options portfolio management

# Task definitions (Requirements: 2.1, 2.2, 2.3)
tasks:
  - name: vol_regime_detection
    description: Identify the current market volatility regime based purely on the given IV surface
    max_steps: 3
    difficulty: easy
  - name: vertical_spread
    description: Execute a vertical spread strategy to profit from directional bias
    max_steps: 8
    difficulty: easy
  - name: delta_hedging
    description: Neutralize portfolio delta through a market shock event
    max_steps: 8
    difficulty: medium
  - name: straddle_trading
    description: Trade straddles to capture volatility expansion or contraction
    max_steps: 13
    difficulty: medium
  - name: earnings_vol_crush
    description: Position for and recover from an earnings volatility crush event
    max_steps: 13
    difficulty: hard
  - name: gamma_scalping
    description: Profit from gamma scalping through spot oscillations
    max_steps: 17
    difficulty: expert
  - name: vega_gamma_stress
    description: Survive a catastrophic dual market shock by neutralizing risk boundaries beforehand
    max_steps: 20
    difficulty: super-boss
  - name: multi_agent_market
    description: "12-actor market simulation with traders, market maker, and oversight"
    max_steps: 300
    difficulty: expert
# Type definitions (Requirement 1.6)
action_type: VSRAction
observation_type: VSRObservation
reward_type: VSRReward
state_type: VSRState

# Server configuration
server:
  host: 0.0.0.0
  port: 8000