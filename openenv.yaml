# OpenEnv manifest for Multi-Agent VSR-Env
# Theme #1: Multi-Agent Interactions

name: vsr-env
version: 2.0.0
description: 6-actor market simulation for multi-agent RL - traders, market maker, oversight

tasks:
  - name: multi_agent_market
    description: "6-actor options market: 4 traders (trader_0 to trader_3), 1 market maker, 1 oversight agent competing and cooperating over 300 steps"
    max_steps: 300
    difficulty: expert

action_type: MultiAgentAction
observation_type: MultiAgentObservation
reward_type: MultiAgentReward
state_type: MultiAgentState

server:
  host: 0.0.0.0
  port: 8000
  entry_point: server.app:app
